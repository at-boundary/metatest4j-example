# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 18
        uses: actions/setup-java@v4
        with:
          java-version: '18'
          distribution: 'temurin'

      # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle Wrapper
        env:
          GPR_USER: ${{ github.actor }}
          GPR_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN }}
        run: ./gradlew build -x test

  end_to_end_tests:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 18
        uses: actions/setup-java@v4
        with:
          java-version: '18'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clone oms-demo-api
        run: git clone https://x-access-token:${{ secrets.GH_PACKAGES_READ_TOKEN }}@github.com/at-boundary/oms-demo-api.git oms-demo-api

      - name: Run End-to-End Tests
        env:
          GPR_USER: ${{ github.actor }}
          GPR_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN }}
        working-directory: oms-demo-api
        run: |
          chmod +x gradlew
          ./gradlew clean test --tests "demoapi.*" --info -DrunWithMetatest=true
